// TRACKING
let usedQuestions = {
  anion: [],
  tatanama: [],
  reaksi: [],
  stoikiometri: []
};

let userAnswers = [];
let questions = [];
let currentIndex = 0;
let score = 0;
let timerInterval;
let timeLeft = 10;
let answered = false;

// START
function startQuiz() {
  startScreen.style.display = "none";
  menuScreen.style.display = "block";
}

// PILIH KATEGORI
function selectCategory(category) {
  menuScreen.style.display = "none";
  quizScreen.style.display = "block";

  let pool = allQuestions[category];

  if (usedQuestions[category].length >= pool.length) {
    usedQuestions[category] = [];
  }

  let available = pool.filter(q => !usedQuestions[category].includes(q));
  available = shuffle(available);

  questions = available.slice(0, Math.min(20, available.length));
  usedQuestions[category].push(...questions);

  currentIndex = 0;
  score = 0;
  userAnswers = [];

  showQuestion();
}

// TAMPIL SOAL
function showQuestion() {
  clearInterval(timerInterval);
  answered = false;

  let q = questions[currentIndex];
  question.innerHTML = q.question;
  progress.innerText = "Soal " + (currentIndex + 1) + " / " + questions.length;

  options.innerHTML = "";

  let opts = shuffle([...q.options]);

  opts.forEach(opt => {
    let btn = document.createElement("button");
    btn.innerHTML = opt;

    btn.onclick = () => {
      if (answered) return;
      answered = true;

      let correct = q.answer;

      userAnswers.push({
        question: q.question,
        selected: opt,
        correct: correct
      });

      if (opt === correct) {
        btn.style.background = "green";
        soundBenar.currentTime = 0;
        soundBenar.play();
        score++;
      } else {
        btn.style.background = "red";
        soundSalah.currentTime = 0;
        soundSalah.play();

        Array.from(options.children).forEach(b => {
          if (b.innerHTML === correct) {
            b.style.background = "green";
          }
        });
      }

      clearInterval(timerInterval);
      setTimeout(nextQuestion, 500);
    };

    options.appendChild(btn);
  });

  startTimer();
}

// TIMER
function startTimer() {
  timeLeft = 10;
  document.getElementById("timer").innerText = "Waktu: " + timeLeft;

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "Waktu: " + timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      soundSalah.currentTime = 0;
      soundSalah.play();

      userAnswers.push({
        question: questions[currentIndex].question,
        selected: "Tidak menjawab",
        correct: questions[currentIndex].answer
      });

      nextQuestion();
    }
  }, 1000);
}

// NEXT
function nextQuestion() {
  currentIndex++;
  if (currentIndex < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

// HASIL
function showResult() {
  clearInterval(timerInterval);

  quizScreen.style.display = "none";
  resultScreen.style.display = "block";

  let nilai = Math.round((score / questions.length) * 100);

  finalScore.innerText =
    "Skor: " + score + "/" + questions.length +
    " | Nilai: " + nilai;
}

// DETAIL TOGGLE
function showDetail() {
  let box = document.getElementById("detailBox");
  let btn = document.getElementById("btnDetail");

  if (box.style.display === "block") {
    box.style.display = "none";
    btn.innerText = "Lihat Detail";
    return;
  }

  box.style.display = "block";
  btn.innerText = "Tutup Detail";
  box.innerHTML = "<h3>Jawaban Salah</h3>";

  userAnswers.forEach(item => {
    if (item.selected !== item.correct) {
      box.innerHTML += `
        <p>
        <b>Soal:</b> ${item.question}<br>
        <b>Kamu:</b> <span style="color:red">${item.selected}</span><br>
        <b>Benar:</b> <span style="color:green">${item.correct}</span>
        </p><hr>`;
    }
  });

  if (!userAnswers.some(i => i.selected !== i.correct)) {
    box.innerHTML += "<p style='color:green'>Semua benar!</p>";
  }
}

// BACK
function backToMenu() {
  resultScreen.style.display = "none";
  menuScreen.style.display = "block";
}

function backToMenuFromQuiz() {
  clearInterval(timerInterval);

  quizScreen.style.display = "none";
  menuScreen.style.display = "block";

  currentIndex = 0;
  score = 0;
  userAnswers = [];
}

</script>
