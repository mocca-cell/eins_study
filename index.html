      {question:"Hipotesis Avogadro menyatakan bahwa volume gas yang sama memiliki?", options:["Jumlah molekul sama","Massa sama","Tekanan sama","Energi sama"], answer:"Jumlah molekul sama"},
      {question:"Tokoh penemu hipotesis ini adalah?", options:["Avogadro","Dalton","Proust","Lavoisier"], answer:"Avogadro"},
      {question:"Gas 1 L dan 1 L pada kondisi sama memiliki?", options:["Jumlah molekul sama","Massa berbeda","Volume berbeda","Tekanan berbeda"], answer:"Jumlah molekul sama"},

      {question:"Jika 5 g H bereaksi dengan 20 g O, massa produk adalah?", options:["25 g","15 g","20 g","5 g"], answer:"25 g"},
      {question:"Jika massa tidak berubah dalam reaksi, berlaku hukum?", options:["Kekekalan Massa","Perbandingan Tetap","Dalton","Avogadro"], answer:"Kekekalan Massa"},

      {question:"Dalam H<sub>2</sub>O, perbandingan massa selalu tetap, sesuai hukum?", options:["Proust","Dalton","Lavoisier","Avogadro"], answer:"Proust"},
      {question:"CO dan CO<sub>2</sub> merupakan contoh hukum?", options:["Dalton","Proust","Lavoisier","Avogadro"], answer:"Dalton"},

      {question:"Perbandingan volume gas sederhana menunjukkan hukum?", options:["Gay-Lussac","Dalton","Proust","Lavoisier"], answer:"Gay-Lussac"},
      {question:"Volume sama → molekul sama menunjukkan hukum?", options:["Avogadro","Dalton","Proust","Lavoisier"], answer:"Avogadro"},
      
      {question:"Jika massa pereaksi 12 g dan 8 g, maka massa produk adalah?", options:["20 g","10 g","16 g","12 g"], answer:"20 g"},
      {question:"Jika suatu reaksi menghasilkan massa lebih kecil dari pereaksi, maka?", options:["Data salah","Hukum benar","Reaksi selesai","Tidak ada reaksi"], answer:"Data salah"},

      {question:"Hukum kekekalan massa berlaku pada reaksi?", options:["Kimia","Fisika","Biologi","Semua salah"], answer:"Kimia"},
      {question:"Perbandingan massa unsur dalam senyawa selalu tetap walaupun jumlah berbeda disebut hukum?", options:["Proust","Dalton","Lavoisier","Avogadro"], answer:"Proust"},

      {question:"Jika 2 senyawa memiliki unsur sama tetapi perbandingan berbeda, berlaku hukum?", options:["Dalton","Proust","Lavoisier","Avogadro"], answer:"Dalton"},
      {question:"CO dan CO<sub>2</sub> berbeda pada jumlah unsur?", options:["Oksigen","Karbon","Tidak ada","Semua sama"], answer:"Oksigen"},

      {question:"Jika volume gas H<sub>2</sub> 4 L bereaksi, maka O<sub>2</sub> yang dibutuhkan adalah?", options:["2 L","4 L","1 L","3 L"], answer:"2 L"},
      {question:"Perbandingan volume gas selalu dalam bentuk?", options:["Bilangan sederhana","Bilangan besar","Bilangan acak","Bilangan negatif"], answer:"Bilangan sederhana"},

      {question:"Jika 3 L N<sub>2</sub> bereaksi, maka H<sub>2</sub> yang diperlukan (reaksi sederhana) adalah?", options:["9 L","3 L","6 L","1 L"], answer:"9 L"},
      {question:"Hukum volume gas ditemukan oleh?", options:["Gay-Lussac","Dalton","Proust","Lavoisier"], answer:"Gay-Lussac"},

      {question:"Menurut Avogadro, volume sama berarti jumlah?", options:["Molekul sama","Massa sama","Energi sama","Atom sama"], answer:"Molekul sama"},
      {question:"Jika volume gas diperbesar 2 kali (kondisi sama), maka jumlah molekul?", options:["2 kali","Tetap","Setengah","Tidak berubah"], answer:"2 kali"},

      {question:"Hukum Lavoisier berhubungan dengan?", options:["Massa","Volume","Tekanan","Suhu"], answer:"Massa"},
      {question:"Hukum Dalton berhubungan dengan?", options:["Perbandingan massa","Volume gas","Jumlah molekul","Tekanan"], answer:"Perbandingan massa"},

      {question:"Hukum Proust menyatakan perbandingan?", options:["Tetap","Berubah","Acak","Tidak pasti"], answer:"Tetap"},
      {question:"Hukum Avogadro berlaku untuk zat?", options:["Gas","Padat","Cair","Logam"], answer:"Gas"},

      {question:"Jika 1 L gas A mengandung 100 partikel, maka 2 L gas A mengandung?", options:["200","100","50","300"], answer:"200"},
      {question:"Jika volume gas sama, maka jumlah partikel juga?", options:["Sama","Berbeda","Lebih kecil","Lebih besar"], answer:"Sama"},

      {question:"Jika massa produk lebih besar dari pereaksi, maka?", options:["Data salah","Benar","Reaksi selesai","Hukum tidak berlaku"], answer:"Data salah"},
      {question:"Jika unsur bergabung membentuk senyawa tetap, maka hukum yang berlaku adalah?", options:["Proust","Dalton","Lavoisier","Avogadro"], answer:"Proust"},

      {question:"Perbandingan volume 2:1 menunjukkan hukum?", options:["Gay-Lussac","Dalton","Proust","Lavoisier"], answer:"Gay-Lussac"},
      {question:"Jumlah molekul ditentukan oleh?", options:["Volume gas","Massa","Suhu","Warna"], answer:"Volume gas"}
      
    ]
  };

  let questions = [];
  let currentIndex = 0;
  let score = 0;
  let timer;
  let timeLeft = 10;
  let answered = false;

  function startQuiz() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("menuScreen").style.display = "block";
  }

  function selectCategory(category) {
    document.getElementById("menuScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "block";

    let pool = shuffle([...allQuestions[category]]);
    questions = pool.slice(0, 20);

    currentIndex = 0;
    score = 0;

    showQuestion();
  }

  function showQuestion() {
    clearInterval(timer);
    answered = false;

    let q = questions[currentIndex];

    document.getElementById("question").innerHTML = q.question;
    document.getElementById("progress").innerText =
      "Soal " + (currentIndex + 1) + " / " + questions.length;

    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    let options = shuffle([...q.options]);

    options.forEach(opt => {
      let btn = document.createElement("button");
      btn.innerHTML = opt;

      btn.onclick = () => {
        if (answered) return;
        answered = true;

        let correct = questions[currentIndex].answer;

        if (opt === correct) {
          btn.style.background = "green";
          document.getElementById("soundBenar").play();
          score++;
        } else {
          btn.style.background = "red";
          document.getElementById("soundSalah").play();
        }

        clearInterval(timer);

        setTimeout(nextQuestion, 400);
      };

      optionsDiv.appendChild(btn);
    });

    startTimer();
  }

  function startTimer() {
    timeLeft = 10;
    document.getElementById("timer").innerText = "Waktu: " + timeLeft;

    timer = setInterval(() => {
      timeLeft--;
      document.getElementById("timer").innerText = "Waktu: " + timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timer);
        nextQuestion();
      }
    }, 1000);
  }

  function nextQuestion() {
    currentIndex++;

    if (currentIndex < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    clearInterval(timer);

    document.getElementById("quizScreen").style.display = "none";
    document.getElementById("resultScreen").style.display = "block";

    let nilai = Math.round((score / questions.length) * 100);

    document.getElementById("finalScore").innerText =
      "Skor: " + score + " / " + questions.length +
      " | Nilai: " + nilai;
  }

  function backToMenu() {
    document.getElementById("resultScreen").style.display = "none";
    document.getElementById("menuScreen").style.display = "block";

    currentIndex = 0;
    score = 0;
  }
</script>
